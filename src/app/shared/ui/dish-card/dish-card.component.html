<article class="flex h-full flex-col rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
  <div class="mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-50 text-2xl font-black text-blue-600">
    {{ dish.name.charAt(0).toUpperCase() }}
  </div>

  <div class="flex flex-1 flex-col">
    <div class="flex items-start justify-between gap-3">
      <div>
        <h3 class="text-lg font-bold text-slate-900">{{ dish.name }}</h3>
        <p class="mt-1 inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">
          {{ category?.name || 'Uncategorized' }}
        </p>
      </div>
      <p class="shrink-0 text-lg font-black text-blue-600">{{ dish.price | currency:'USD':'symbol':'1.2-2' }}</p>
    </div>

    @if (!dish.active) {
      <p class="mt-4 rounded-lg bg-red-50 px-3 py-2 text-sm font-semibold text-red-600">Inactive</p>
    }

    @if (showAddToOrder) {
      <div class="mt-6 flex items-center justify-between gap-3">
        <div class="flex items-center rounded-full border border-slate-200 bg-slate-50 p-1">
          <button type="button" class="grid h-9 w-9 place-items-center rounded-full text-lg font-bold text-slate-700 hover:bg-white" (click)="decrement()">-</button>
          <span class="w-8 text-center text-sm font-bold text-slate-900">{{ quantity }}</span>
          <button type="button" class="grid h-9 w-9 place-items-center rounded-full text-lg font-bold text-slate-700 hover:bg-white" (click)="increment()">+</button>
        </div>
        <button type="button" class="rounded-full bg-blue-600 px-4 py-2 text-sm font-bold text-white shadow-sm hover:bg-blue-700" (click)="increment()">
          Add
        </button>
      </div>
    }
  </div>
</article>
