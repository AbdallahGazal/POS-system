<div class="pointer-events-none fixed right-4 top-20 z-50 flex w-[calc(100%-2rem)] max-w-sm flex-col gap-3">
  @for (message of toast.messages(); track message.id) {
    <button type="button" [class]="toastClasses(message.type)" (click)="toast.dismiss(message.id)">
      {{ message.message }}
    </button>
  }
</div>
