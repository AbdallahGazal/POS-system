<div class="fixed inset-0 z-40 grid place-items-center bg-slate-900/50 p-4">
  <section class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
    <h2 class="text-xl font-black text-slate-900">{{ title }}</h2>
    <p class="mt-3 text-sm leading-6 text-slate-600">{{ message }}</p>
    <div class="mt-6 flex justify-end gap-3">
      <button type="button" class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50" (click)="cancelled.emit()">
        {{ cancelText }}
      </button>
      <button type="button" [class]="danger ? 'rounded-lg bg-red-500 px-4 py-2 text-sm font-bold text-white hover:bg-red-600' : 'rounded-lg bg-blue-600 px-4 py-2 text-sm font-bold text-white hover:bg-blue-700'" (click)="confirmed.emit()">
        {{ confirmText }}
      </button>
    </div>
  </section>
</div>
